    <script>
        // --- IMMERSIVE NUTRITION KNOWLEDGE BASE ---
        const lessonPhases = [
            {
                title: "PHASE 1: Balanced Diet Foundations",
                focusText: "Concept: Defining a Balanced Diet",
                details: "A balanced diet naturally integrates structural options from all main food groups in precise physiological ratios. This pattern ensures your body receives necessary macronutrients, vitamins, and minerals for optimal cellular repair and systemic energy management without strict starvation restriction.",
                color: "#27ae60"
            },
            {
                title: "PHASE 2: Core Metrics Decoded",
                focusText: "Concept: Healthy vs. Unhealthy Profiles",
                details: "Analyze basic modern health classifications:\n• Healthy Food: Nutrients that support biological repair and low systemic inflammation (e.g., Spinach, Avocado, Beans, Snoek).\n• Unhealthy Food: Highly refined structures that alter glucose spikes and add dense saturated trans-fats (e.g., Soda, Fat Cakes).",
                color: "#2980b9"
            },
            {
                title: "PHASE 3: Caloric Density Vectors",
                focusText: "Concept: Energy, Nutrient, & Empty Calories",
                details: "Examine high-level calorie compositions:\n• Nutrient-Dense: High micronutrients relative to energy mass (Spinach).\n• Energy-Dense: High caloric payload relative to volume (Avocado).\n• Empty Calorie: High simple sugar concentrations completely devoid of fiber or active mineral chains (Soda).",
                color: "#ff007f"
            },
            {
                title: "PHASE 4: Modern Food Processing",
                focusText: "Concept: Fast Food, Processed, & Organic",
                details: "Deconstruct how food is handled commercially:\n• Fast Food: Commercial combinations prioritized for fast preparation speed (Kota).\n• Processed Food: Altered raw states to safely preserve shelf-life or target cultures (Yoghurt).\n• Organic Food: Natural cultivation free from chemical synthetic inputs.",
                color: "#9b59b6"
            },
            {
                title: "PHASE 5: Food Group Taxonomy",
                focusText: "Concept: Sweets, Vegetables, and Fats",
                details: "Every staple anchors a core food lineage. Match items to cross-examine group properties:\n• Sweets Group: Energy delivery vectors via fast-acting simple carbohydrates.\n• Vegetables Group: High-fiber cell structures providing crucial daily vitamins.\n• Fats Group: Essential lipid molecules critical for hormone health and brain protection.",
                color: "#f1c40f"
            },
            {
                title: "PHASE 6: Food Group Taxonomy",
                focusText: "Concept: Dairy, Carbohydrates, and Proteins",
                details: "Complete your macro mapping sequences:\n• Dairy Group: Provides rich bioavailable calcium matrices and essential probiotic strains.\n• Carbs Group: Glucose energy supply lines including grains, starches, and tubers.\n• Proteins Group: Fundamental amino acid chains required for muscular growth and rebuilding.",
                color: "#1abc9c"
            },
            {
                title: "PHASE 7: Portion Size Mastery",
                focusText: "Concept: Hand Measurements for Weight Control",
                details: "How do you handle portion boundaries without mechanical scales? Click a basin plate to unlock rules:\n• Vegetables: Half your plate (Size of your closed fist)\n• Proteins: Quarter plate (Thickness and width of an open palm)\n• Carbs: Quarter plate (Volume of a single cupped hand)\n• Fats/Sweets: Sparingly (Size of your thumb tip)",
                color: "#e67e22"
            }
        ];

        const nutritionDatabase = {
            "Sweets": { 
                definition: "Empty Calorie / Unhealthy: Fast-acting sugars and solid saturated trans-fats completely empty of natural fiber or mineral chains (e.g., Soda Can).", 
                portionTip: "Portion Habit (Q9): Treat as occasional luxury items. Single active serving volumes should never exceed the precise size of your thumb tip." 
            },
            "Vegetables": { 
                definition: "Nutrient-Dense / Healthy / Organic: Packed with natural cellular antioxidants, active micronutrients, and high dietary fiber at low energy weights (e.g., Organic Spinach).", 
                portionTip: "Portion Habit (Q9): Target filling 50% of your total primary plate. A single portion should match the absolute volume of your closed fist." 
            },
            "Fats": { 
                definition: "Energy-Dense Food: High caloric payload relative to physical mass. Differentiates sharply between healthy raw plant lipids (Avocado) and deep-fried items (Fat Cakes).", 
                portionTip: "Portion Habit (Q9): Vital for hormone production, but use carefully. Limit extracted oils to roughly one single teaspoon volume per preparation session." 
            },
            "Dairy": { 
                definition: "Processed Food Source: Real dairy structures safely pasteurized or fermented (like plain cultured yoghurt) to preserve high calcium profiles and live bacteria cultures.", 
                portionTip: "Portion Habit (Q9): Aim for one single compact tub or cup volume (handful size) per active serving block. Avoid hidden flavored syrups." 
            },
            "Carbs": { 
                definition: "Staple Carbohydrates / Fast Food Primary glucose fuel source. Ranges from high-fiber complex whole grains (Mageu) to layered commercial fast food setups (Traditional Kota).", 
                portionTip: "Portion Habit (Q9): Should occupy exactly 25% of a healthy plate matrix. Keep your starches strictly limited to the volume of a single cupped hand." 
            },
            "Proteins": { 
                definition: "Nutrient-Dense Building Blocks: Amino acid combinations necessary for organic muscle tissue reconstruction, cellular repair, and optimal enzyme function (e.g., Snoek, Chicken, Beans).", 
                portionTip: "Portion Habit (Q9): Should occupy 25% of your total plate configuration. Serving thickness and area should match your flat open palm." 
            }
        };

        // --- REAL-TIME FUNCTIONING CLOCK COMPONENT ENGINE ---
        AFRAME.registerComponent('analogue-clock', {
            init: function () {
                this.hourHand = this.el.querySelector('#clock-hour-hand');
                this.minuteHand = this.el.querySelector('#clock-minute-hand');
                this.secondHand = this.el.querySelector('#clock-second-hand');
            },
            tick: function () {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                // Calculate rotational degree positions based on standard 360 unit divisions
                const secondDeg = seconds * 6; 
                const minuteDeg = (minutes * 6) + (seconds * 0.1);
                const hourDeg = (hours * 30) + (minutes * 0.5);

                // Update properties across the 3D target nodes natively
                if (this.secondHand) this.secondHand.setAttribute('rotation', `0 0 ${-secondDeg}`);
                if (this.minuteHand) this.minuteHand.setAttribute('rotation', `0 0 ${-minuteDeg}`);
                if (this.hourHand) this.hourHand.setAttribute('rotation', `0 0 ${-hourDeg}`);
            }
        });

        // --- CORE SESSION LOGIC SYSTEM ---
        AFRAME.registerComponent('laboratory-manager', {
            init: function () {
                this.currentPhase = 0;
                this.selectedFood = null;
                this.foods = [];
                this.plates = [];
                this.originalPositions = new Map();
                
                this.el.sceneEl.querySelectorAll('.food').forEach(el => {
                    this.foods.push(el);
                    const pos = el.getAttribute('position');
                    this.originalPositions.set(el, {x: parseFloat(pos.x), y: parseFloat(pos.y), z: parseFloat(pos.z)});
                });
                this.el.sceneEl.querySelectorAll('.plate').forEach(el => this.plates.push(el));

                this.updateUI();
                this.bindEvents();
            },

            bindEvents: function () {
                const boardTitle = document.querySelector('#board-title');
                const boardBody = document.querySelector('#board-body');

                this.foods.forEach(food => {
                    food.addEventListener('click', () => {
                        if (this.selectedFood) {
                            this.selectedFood.removeAttribute('animation__hover');
                            this.selectedFood.setAttribute('scale', '1 1 1');
                        }
                        
                        this.selectedFood = food;
                        this.selectedFood.setAttribute('animation__hover', {
                            property: 'scale',
                            to: '1.15 1.15 1.15',
                            dir: 'alternate',
                            dur: 400,
                            loop: true
                        });

                        const name = food.getAttribute('data-name');
                        const group = food.getAttribute('data-group');
                        
                        boardTitle.setAttribute('value', `Analyzing: ${name}`);
                        boardTitle.setAttribute('color', '#e67e22');
                        boardBody.setAttribute('value', `Nutritional Group: ${group}\n\nAction Required:\nSelect and click the matching marble collection basin across the main counter to cross-reference data.`);
                    });
                });

                this.plates.forEach(plate => {
                    plate.addEventListener('click', () => {
                        const targetGroup = plate.getAttribute('data-category');

                        if (this.selectedFood) {
                            const originalGroup = this.selectedFood.getAttribute('data-group');
                            
                            if (targetGroup === originalGroup) {
                                const platePos = plate.getAttribute('position');
                                const rx = (Math.random() - 0.5) * 0.15;
                                const rz = (Math.random() - 0.5) * 0.15;
                                
                                this.selectedFood.removeAttribute('animation__hover');
                                this.selectedFood.setAttribute('scale', '1 1 1');
                                this.selectedFood.setAttribute('position', {
                                    x: parseFloat(platePos.x) + rx,
                                    y: parseFloat(platePos.y) + 0.06,
                                    z: parseFloat(platePos.z) + rz
                                });
                                
                                boardTitle.setAttribute('value', `Success: ${targetGroup} Validated`);
                                boardTitle.setAttribute('color', '#27ae60');
                                
                                const content = nutritionDatabase[targetGroup];
                                if (this.currentPhase === 1 || this.currentPhase === 2 || this.currentPhase === 3) {
                                    boardBody.setAttribute('value', `Terminology Metric (Q3):\n${content.definition}`);
                                } else if (this.currentPhase === 6) {
                                    boardBody.setAttribute('value', `Portion Control Metric (Q9):\n${content.portionTip}`);
                                } else {
                                    boardBody.setAttribute('value', `Analysis Master:\n${content.definition}\n\n${content.portionTip}`);
                                }
                                
                                this.selectedFood = null;
                            } else {
                                const foodName = this.selectedFood.getAttribute('data-name');
                                boardTitle.setAttribute('value', "Classification Error");
                                boardTitle.setAttribute('color', '#c0392b');
                                boardBody.setAttribute('value', `"${foodName}" does not map to the biochemical or physiological profile assigned to the ${targetGroup} basin.`);
                            }
                        } else {
                            boardTitle.setAttribute('value', `${targetGroup} Category Profile`);
                            boardTitle.setAttribute('color', '#2980b9');
                            const content = nutritionDatabase[targetGroup];
                            boardBody.setAttribute('value', `Definition:\n${content.definition}\n\n${content.portionTip}`);
                        }
                    });
                });

                document.querySelector('#btn-next').addEventListener('click', () => {
                    this.currentPhase = (this.currentPhase + 1) % lessonPhases.length;
                    this.updateUI();
                });

                document.querySelector('#btn-reset').addEventListener('click', () => {
                    this.foods.forEach(food => {
                        food.removeAttribute('animation__hover');
                        food.setAttribute('scale', '1 1 1');
                        food.setAttribute('position', this.originalPositions.get(food));
                    });
                    this.selectedFood = null;
                    this.updateUI();
                });
            },

            updateUI: function () {
                const phase = lessonPhases[this.currentPhase];
                document.querySelector('#panel-header').setAttribute('value', phase.title);
                document.querySelector('#panel-subheader').setAttribute('value', phase.focusText);
                document.querySelector('#panel-subheader').setAttribute('color', phase.color);
                
                document.querySelector('#board-title').setAttribute('value', phase.focusText);
                document.querySelector('#board-title').setAttribute('color', phase.color);
                document.querySelector('#board-body').setAttribute('value', phase.details);
            }
        });
    </script>
